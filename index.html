<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пустота</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=PT+Sans+Narrow:wght@400;700&family=Press+Start+2P&display=swap');

        :root {
            --term-green: #20C20E;
            --term-dark: #051005;
            --term-glow: 0 0 10px rgba(32, 194, 14, 0.5), 0 0 20px rgba(32, 194, 14, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: var(--term-green);
            font-family: 'Press Start 2P', monospace;
            
            /* Главная магия здесь: 
               12px - минимальный размер для телефонов
               1.2vw + 10px - динамический размер, зависящий от ширины экрана
               20px - максимальный размер для твоих 3440px и других больших мониторов */
            font-size: clamp(12px, 1.2vw + 10px, 20px);
            
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: default;
        }

        .environment {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0e0a 0%, #000000 80%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .crt-container {
            position: relative;
            width: 90vw;
            height: 90vh;
            max-width: 1000px;
            background-color: var(--term-dark);
            border: 2px solid #0a1f0a;
            border-radius: 20px;
            box-shadow: inset 0 0 50px #000;
            overflow: hidden;
            padding: 50px 40px;
            opacity: 0; 
        }

        .crt-power-on {
            animation: crtTurnOn 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes crtTurnOn {
            0% { transform: scale(0.01, 0.002); filter: brightness(30); opacity: 0; }
            10% { transform: scale(0.1, 0.002); filter: brightness(30); opacity: 1; }
            30% { transform: scale(1, 0.002); filter: brightness(30); }
            100% { transform: scale(1, 1); filter: brightness(1); opacity: 1; }
        }

        .crt-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 50;
            pointer-events: none;
        }

        .crt-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.9) 100%);
            z-index: 51;
            pointer-events: none;
        }

        .vhs-tracking {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.05"/></svg>');
            opacity: 0.15;
            z-index: 49;
            pointer-events: none;
            animation: tracking 5s infinite;
        }

        @keyframes tracking {
            0% { transform: translateY(0); opacity: 0.15;}
            10% { transform: translateY(-5px); opacity: 0.25;}
            20% { transform: translateY(5px); opacity: 0.1;}
            100% { transform: translateY(0); opacity: 0.15;}
        }

        #screen {
            position: relative;
            z-index: 10;
            height: 100%;
            overflow-y: auto;
            text-shadow: var(--term-glow);
            scrollbar-width: none;
            padding-right: 20px;
        }
        
        #screen::-webkit-scrollbar {
            display: none; 
        }

        .paragraph {
            margin-bottom: 25px;
            line-height: 1.6;
            word-wrap: break-word;
            opacity: 0.9;
        }

        .final-cursor {
            display: inline-block;
            transition: opacity 0.1s;
            text-shadow: 0 0 15px rgba(32, 194, 14, 0.9);
        }

        #init-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            color: rgba(255,255,255,0.3);
            font-family: sans-serif;
            letter-spacing: 2px;
        }

        .init-text {
            font-size: 1rem;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        @media (max-width: 768px) {
            .crt-container { 
                padding: 25px 15px; /* Уменьшаем внутренние отступы на телефоне */
                width: 95vw;        /* Делаем контейнер чуть шире на маленьких экранах */
                height: 95vh;
            }
            .paragraph {
                margin-bottom: 20px; /* Чуть уменьшаем расстояние между абзацами */
            }
        }
    </style>
</head>
<body>

    <div id="init-screen" onclick="startSequence()">
        <div class="init-text">нажмите, чтобы открыть</div>
		<div class="init-text">[ЭТОТ САЙТ СО ЗВУКОМ]</div>
    </div>

    <div class="environment">
        <div class="crt-container">
            <div class="vhs-tracking"></div>
            <div id="screen"></div>
        </div>
    </div>

    <script>
        const storyText = [
			"\[04.07.2026\]",
			"\"Люди вообще гениально устроились со своим стереотипом про \"поиск внимания\". Если тебя рвет на части и ты кричишь об этом, тебе тут же лепят ярлык нытика, которому просто скучно. Никто, блять, не хочет верить, что тебе реально плохо. Всем гораздо проще думать, что ты просто выделываешься, потому что так удобнее закрыть глаза на чужую боль.\" - whyttorenko",
			
            "Привет. Я пишу это в абсолютную пустоту, каким-то совершенно незнакомым людям, на своем сайте созданный нейросетью... Пишу просто потому, что меня буквально рвет на части изнутри, и я больше не могу держать это в себе. Если честно, я нахожусь в полном ахуе от того, во что превратилась моя жизнь. Такое стойкое ощущение, будто меня затянуло в какое-то бесконечное торнадо из непроглядной параши, я лечу вниз, и мне даже не за что ухватиться..",
            
            "Мне 21 год. Казалось бы, самое время жить, что-то пробовать, но я всё ещё сижу на шее у родителей, каждый день просыпаюсь, и это давит всё сильнее. А дома творится просто лютый, невыносимый пиздец. Походу, батя ходит налево, и эта мерзкая, грязная тайна висит в каждой комнате, скрываясь за фальшивыми улыбками и пустыми разговорами на кухне. И знаете, что самое страшное? Мне тупо не с кем этим поделиться... Вообще НИКОГО....",
			
			"[ЭФФЕКТ]",
            
            "Единственный человек, которому я доверял на все 101%, кто меня понимал без слов, это мой брат. Но его, блять, больше нет. И эта зияющая пустота после него... она физически болит каждый день. Я остался абсолютно один, заперт наедине с самим собой в своей голове, и от этого просто едет крыша. Вариться в этом яде в одиночку стало совершенно невыносимо.",
            
            "Я чувствую, что застрял в какой-то мертвой точке. Мои ноги словно залиты бетоном. Мне дико, до паники страшно браться за что-то новое или даже просто добивать старые дела. Я парализован этим страхом: боюсь, что меня снова обосрут, засмеют, скажут, что я хуесос, или просто пошлют нахуй. Вся эта неуверенность просто выедает меня изнутри...",
            
            "Я 3Д-аниматор. Занимаюсь этим хрен знает каким стажем, больше четырех лет угрохал в эти полигоны, рендеры и ключи анимации... Но сейчас у меня жесточайший блок. Все говорят, что всё классно, хвалят меня. А я смотрю на свои работы и вижу только кривое, уебищное нечто со всратым светом и мертвыми движениями. Мне настолько стыдно за то, что я делаю, меня так тошнит от собственных кадров, что я просто бросаю заказы на полпути. Тупо сливаюсь...",
            
            "И знаете, что добивает сильнее всего? Эти тупые, пустые фразочки, которые они кидают как подачку. В стиле: \"Если бы ты реально хотел выбраться из этого, ты бы уже что-то сделал, а не сидел тут и не ныл.\". Да как я блять сделаю?! Как я встану и пойду что-то делать, если у меня моральных сил нихуя не осталось? Если я просыпаюсь с утра уже уставшим, разбитым и опустошенным?! Пиздец..",
            
            "Я так устал от неадекватных людей... \[ДАННЫЕ УДАЛЕНЫ\], спасибо \[???????\], \[????\], \[?????\], \[??????\], без вас я бы и не понял что есть на столько мерзотные люди! Я просто до боли в груди хочу, чтобы меня кто-то искренне любил. Чтобы меня просто обняли, выслушали и поддержали. Без условий и манипуляций...",
            
            "У меня есть мечта, свалить из России куда-нибудь подальше от всего этого пиздеца, начать всё с чистого листа. Но я продолжаю сидеть на жопе ровно, прирос к этому креслу, потому что ебаная тревога и тотальная неуверенность в себе меня сжирают заживо. В отношениях, даже в жалких попытках их завести, я вообще пиздец тревожный, наивный дурак. Цепляюсь за людей и постоянно ищу подтверждения, что я хоть кому-то нужен.",
            
            "Сижу сейчас перед этим светящимся экраном, прошу нейросеть сделать сайт красивый, чтобы просто был.. Плачу, и вообще не ебу, как жить дальше. Пишу это всё только потому, что терпеть эту разъедающую боль внутри не могу.. Звучит как сюжет какой-то игры, но когда это стало явью, это не смешно. Спасибо. на этом все. Больше нет никаких сил"
        ];

        let audioCtx;
        let masterGain;
        let noiseNode;
		let skipCurrentParagraph = false; // Наш флажок для пропуска

        // Отслеживаем клик мышкой
        document.addEventListener('click', () => {
            skipCurrentParagraph = true;
        });

        // Отслеживаем нажатие Пробела или Enter
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                skipCurrentParagraph = true;
            }
        });

        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.15;
            masterGain.connect(audioCtx.destination);

            // Создаем тихий фоновый шум/гул старого оборудования
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = noiseBuffer;
            noiseNode.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 250; 

            noiseNode.connect(filter);
            filter.connect(masterGain);
            noiseNode.start();
        }

        function playPowerOnSound() {
            if (!audioCtx) return;
            
            // Низкий гул включения трансформатора
            const lowOsc = audioCtx.createOscillator();
            const lowGain = audioCtx.createGain();
            lowOsc.type = 'sine';
            lowOsc.frequency.setValueAtTime(30, audioCtx.currentTime);
            lowOsc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 1.2);
            lowGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            lowGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            lowOsc.connect(lowGain);
            lowGain.connect(masterGain);
            lowOsc.start();
            lowOsc.stop(audioCtx.currentTime + 1.5);

            // Высокочастотный писк зарядки кинескопа
            const highOsc = audioCtx.createOscillator();
            const highGain = audioCtx.createGain();
            highOsc.type = 'sawtooth';
            highOsc.frequency.setValueAtTime(200, audioCtx.currentTime);
            highOsc.frequency.exponentialRampToValueAtTime(12000, audioCtx.currentTime + 0.8);
            
            highGain.gain.setValueAtTime(0, audioCtx.currentTime);
            highGain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.1);
            highGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            highOsc.connect(highGain);
            highGain.connect(masterGain);
            highOsc.start();
            highOsc.stop(audioCtx.currentTime + 1.5);
        }

        function playTypeSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(600 + Math.random() * 200, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            
            osc.connect(gain);
            gain.connect(masterGain);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playHollowBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Низкий, гулкий звук для финального курсора
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(100, audioCtx.currentTime); 
            
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6); // Длинное эхо/затухание
            
            osc.connect(gain);
            gain.connect(masterGain);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.7);
        }

        async function startSequence() {
            document.getElementById('init-screen').style.display = 'none';
            initAudio(); 
            playPowerOnSound(); 
            
            const crt = document.querySelector('.crt-container');
            crt.classList.add('crt-power-on'); 
            
            await new Promise(r => setTimeout(r, 2000)); 
            runStory(); 
        }

        async function runStory() {
            const screen = document.getElementById('screen');

            for (let i = 0; i < storyText.length; i++) {
                const p = document.createElement('div');
                p.className = 'paragraph';
                screen.appendChild(p);

                const text = storyText[i];
                
                // Проверка на наш спецэффект
                if (text === "[ЭФФЕКТ]") {
                    await typeSpecialParagraph(p);
                    await new Promise(r => setTimeout(r, 1200)); 
                    continue; 
                }
                
                // Печать обычного текста
                for (let j = 0; j < text.length; j++) {
                    const char = text[j];
                    p.innerHTML += char;
                    
                    if (char !== ' ') {
                        if (!skipCurrentParagraph) {
                            playTypeSound();
                        }
                    }

                    screen.scrollTop = screen.scrollHeight;

                    let delay = 30 + Math.random() * 30; 
                    
                    if (char === '.' || char === '!' || char === '?') {
                        delay = 500 + Math.random() * 300; 
                    } else if (char === ',') {
                        delay = 200; 
                    }

                    // Если был клик, задержка становится 0
                    if (skipCurrentParagraph) {
                        delay = 0;
                    }

                    await new Promise(r => setTimeout(r, delay));
                }

                // Сбрасываем пропуск для следующего абзаца
                skipCurrentParagraph = false;
                await new Promise(r => setTimeout(r, 1200));
            }

            const lastP = screen.lastChild;
            await new Promise(r => setTimeout(r, 1500));
            
            // Три финальные точки
            for(let i = 0; i < 3; i++) {
                lastP.innerHTML += '.';
                playTypeSound();
                screen.scrollTop = screen.scrollHeight;
                await new Promise(r => setTimeout(r, 1800)); 
            }

            // Добавляем мигающий курсор
            const cursor = document.createElement('span');
            cursor.className = 'final-cursor';
            cursor.textContent = '|';
            cursor.style.opacity = '1';
            lastP.appendChild(cursor);
            
            screen.scrollTop = screen.scrollHeight;
            playHollowBeep();

            // Цикл мигания курсора
            setInterval(() => {
                if (cursor.style.opacity === '1') {
                    cursor.style.opacity = '0';
                } else {
                    cursor.style.opacity = '1';
                    playHollowBeep();
                }
            }, 1000); 
        }
		
	async function typeSpecialParagraph(p) {
            const screen = document.getElementById('screen');
            const part1 = "Они не поймут. Вообще. В лучшем случае на меня посмотрят как на ненормального, а в худшем, снова вывалят эту тошнотворную порцию дежурного дерьма в стиле: \"Не выдумывай, всё в твоих руках, просто возьми себя в руки\". От этих слов хочется просто ";
            
            for (let char of part1) {
                p.innerHTML += char;
                if (!skipCurrentParagraph) playTypeSound();
                
                let delay = 30 + Math.random() * 30;
                if (char === '.' || char === ',' || char === '»') delay += 300;
                if (skipCurrentParagraph) delay = 0;
                
                await new Promise(r => setTimeout(r, delay));
                screen.scrollTop = screen.scrollHeight;
            }

            // Убираем длинную паузу, если был клик
            await new Promise(r => setTimeout(r, skipCurrentParagraph ? 0 : 800)); 

            const span = document.createElement('span');
            p.appendChild(span);
            const ume = "уме";
            
            for (let char of ume) {
                span.innerHTML += char;
                if (!skipCurrentParagraph) playTypeSound();
                await new Promise(r => setTimeout(r, skipCurrentParagraph ? 0 : 500));
                screen.scrollTop = screen.scrollHeight;
            }

            await new Promise(r => setTimeout(r, skipCurrentParagraph ? 0 : 600));

            span.style.backgroundColor = "var(--term-green)";
            span.style.color = "#000";
            if (!skipCurrentParagraph) playHollowBeep(); 
            
            await new Promise(r => setTimeout(r, skipCurrentParagraph ? 0 : 500));

            span.style.backgroundColor = "transparent";
            span.style.color = "var(--term-green)";
            span.innerHTML = ""; 
            
            const molchat = "молчать... ";
            for (let char of molchat) {
                span.innerHTML += char;
                if (!skipCurrentParagraph) playTypeSound();
                await new Promise(r => setTimeout(r, skipCurrentParagraph ? 0 : 60)); 
                screen.scrollTop = screen.scrollHeight;
            }
            
            await new Promise(r => setTimeout(r, skipCurrentParagraph ? 0 : 800));
            
            const part2 = "Они искренне думают, что это поддержка, а по факту, удобный способ отмахнуться, поставить галочку и не вникать в то, что я прямо сейчас медленно задыхаюсь в соседней комнате.";
            for (let char of part2) {
                p.innerHTML += char;
                if (!skipCurrentParagraph) playTypeSound();
                
                let delay = 30 + Math.random() * 30;
                if (char === '.' || char === ',') delay += 200;
                if (skipCurrentParagraph) delay = 0;
                
                await new Promise(r => setTimeout(r, delay));
                screen.scrollTop = screen.scrollHeight;
            }
            
            skipCurrentParagraph = false; // Сбрасываем флажок в конце
        }
    </script>
</body>
</html>
